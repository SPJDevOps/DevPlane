# Default values for workspace-operator.
#
# Deploy (example):
#   helm install workspace-operator . -n workspace-operator-system --create-namespace -f my-values.yaml
#
# --- Production vs lab ---
# Defaults below target a typical production control plane: enough CPU/RAM for steady reconcile
# load, gateway HA (2 replicas), and predictable OIDC/workspace behaviour. For a minimal
# lab cluster you may lower operator/gateway requests (e.g. operator requests cpu 10m,
# memory 64Mi) — avoid omitting limits entirely in shared clusters.
#
# Security-relevant knobs (review before go-live):
#   gateway.enabled          — false = operator-only (no user-facing OIDC / HTTP).
#   gateway.oidc.*           — prefer existingSecret in prod (no client secret in Helm state).
#   gateway.ingress.*        — enable TLS + correct host; must match IdP redirect URLs.
#   gateway.createWorkspaceNamespace — false if GitOps owns the workspaces namespace.
#   workspace.ai.egressNamespaces / egressPorts — network boundary for user pods (deny-all NP).
#   workspace.idleTimeout    — stop idle pods to cap cluster load; empty = no auto-stop.
#   workspace.defaultCABundle / gateway.tls.customCABundle — trust for private CAs.
#   operator.leaderElect     — keep true whenever replicas > 1; required for single-replica HA semantics.

operator:
  image:
    repository: ghcr.io/spjdevops/devplane/workspace-operator
    tag: ""
    pullPolicy: IfNotPresent
  # One replica is normal; leader election still coordinates if you scale up for HA tests.
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  leaderElect: true

gateway:
  # When true, set gateway.oidc.* or gateway.oidc.existingSecret; Helm fails fast if
  # inline OIDC fields are empty (predictable install). Use gateway.enabled=false for operator-only.
  enabled: true
  image:
    repository: ghcr.io/spjdevops/devplane/workspace-gateway
    tag: ""
    pullPolicy: IfNotPresent
  # Two replicas: rolling updates and one-node failure without full outage (session may reconnect).
  replicas: 2
  # Token-bucket limits (RPS + burst). Zero = unlimited. Applied after OIDC validation using the
  # subject claim as the per-user key. See README "Observability" and docs/deployment.md.
  rateLimit:
    lifecycle:
      globalRPS: 0
      globalBurst: 0
      perUserRPS: 0
      perUserBurst: 0
    websocket:
      globalRPS: 0
      globalBurst: 0
      perUserRPS: 0
      perUserBurst: 0
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  workspaceNamespace: "workspaces"  # dedicated namespace for user pods/pvcs/services
  createWorkspaceNamespace: true     # create this namespace as part of helm install
  oidc:
    issuerURL: ""
    clientID: ""
    clientSecret: ""   # OIDC client secret for authorization code flow
    redirectURL: ""    # Full callback URL, e.g. https://devplane.example.com/callback
    # Optional JWT audience when it differs from clientID (defaults to clientID).
    audience: ""
    # Name of an existing Secret with keys: issuer-url, client-id, client-secret, redirect-url.
    # If set, oidc.issuerURL / clientID / clientSecret / redirectURL are ignored.
    existingSecret: ""
  tls:
    customCABundle:
      configMapName: ""
  ingress:
    enabled: false
    className: ""
    host: devplane.example.com
    tls: []

workspace:
  image:
    repository: ghcr.io/spjdevops/devplane/workspace
    tag: ""
  defaultResources:
    cpu: "2"
    memory: "4Gi"
    storage: "20Gi"
  storageClass: ""
  ai:
    # Network egress model (operator → per-Workspace CR):
    # - Helm sets LLM_NAMESPACES and EGRESS_PORTS on the operator Deployment.
    # - Each reconcile uses spec.aiConfig when set; otherwise operator env;
    #   if LLM namespaces are still empty, the reconciler defaults to "ai-system"
    #   (see pkg/security.ResolveLLMEgressNamespaces). There is no opt-out via
    #   an empty list today — set explicit namespaces for your LLM services.
    # - Deny-all NetworkPolicy + separate egress/ingress policies: see README
    #   "Verifying network isolation" and docs/deployment.md.
    # providers is the list of AI provider backends available to workspace pods.
    # Each entry requires a name (used as the opencode provider key), an endpoint
    # (OpenAI-compatible base URL), and at least one model ID.
    providers:
      - name: local
        endpoint: "http://vllm.ai-system.svc:8000"
        models:
          - deepseek-coder-33b-instruct
    # egressNamespaces is the list of Kubernetes namespaces where LLM services run.
    # Workspace pods are allowed to reach all pods in these namespaces (any port).
    # The operator joins this list into a comma-separated LLM_NAMESPACES env var.
    egressNamespaces:
      - ai-system
    # egressPorts is the list of TCP ports workspace pods are allowed to reach on
    # external IPs (0.0.0.0/0).  Covers git-over-SSH (22), HTTP/HTTPS (80/443),
    # Docker registry (5000), vLLM (8000), Nexus/Artifactory (8080/8081), and
    # Ollama (11434).  Override to restrict or expand as needed.
    # The operator joins this list into a comma-separated EGRESS_PORTS env var.
    egressPorts:
      - 22
      - 80
      - 443
      - 5000
      - 8000
      - 8080
      - 8081
      - 11434
  # idleTimeout: operator default for how long a Running workspace may be inactive
  # (no gateway updates to status.lastAccessed) before its pod is stopped. Go
  # duration syntax (e.g. "24h", "8h30m"). Leave empty to disable unless a Workspace
  # sets spec.lifecycle.idleTimeout. Per-Workspace: spec.lifecycle.idleTimeout
  # overrides this; use "0" there to disable idle shutdown for one workspace only.
  idleTimeout: "24h"
  # defaultCABundle: name of a ConfigMap in the workspaces namespace containing
  # custom CA certificates. Applied to all workspace pods when set. Individual
  # Workspace CRs can still override this via spec.tls.customCABundle.
  defaultCABundle:
    configMapName: ""
  # packageMirrors: configure pip and npm to use internal mirrors (air-gapped).
  packageMirrors:
    pip:
      indexUrl: ""     # e.g. https://nexus.example.com/repository/pypi-proxy/simple
      trustedHost: ""  # hostname only, e.g. nexus.example.com (for self-signed certs)
    npm:
      registry: ""     # e.g. https://nexus.example.com/repository/npm-proxy
