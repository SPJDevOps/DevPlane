{{- if and .Values.gateway.enabled (not .Values.gateway.oidc.existingSecret) }}
{{- $issuer := required "gateway is enabled: set gateway.oidc.issuerURL or gateway.oidc.existingSecret to a pre-created Secret name" .Values.gateway.oidc.issuerURL }}
{{- $client := required "gateway is enabled: set gateway.oidc.clientID or gateway.oidc.existingSecret" .Values.gateway.oidc.clientID }}
{{- $secret := required "gateway is enabled: set gateway.oidc.clientSecret or gateway.oidc.existingSecret" .Values.gateway.oidc.clientSecret }}
{{- $redirect := required "gateway is enabled: set gateway.oidc.redirectURL (public https://host/callback) or gateway.oidc.existingSecret" .Values.gateway.oidc.redirectURL }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-gateway-oidc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "workspace-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  issuer-url: {{ $issuer | quote }}
  client-id: {{ $client | quote }}
  client-secret: {{ $secret | quote }}
  redirect-url: {{ $redirect | quote }}
{{- end }}
